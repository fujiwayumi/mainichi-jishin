name: Earthquake Auto Post

on:
  schedule:
    - cron: '*/5 * * * *'   # 速報：15分おきに起動
    - cron: '0 15 * * *'    # 日次まとめ：毎日深夜0時30分 JST（= UTC 15:30）
  workflow_dispatch:          # 手動実行も可能

# リポジトリへの書き込み権限を付与
permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # 速報ジョブ（15分おき）
  # ──────────────────────────────────────────
  earthquake-alert:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && !contains(github.event.schedule, '30 15'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run earthquake alert
        run: python earthquake_alert.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}

      - name: Save memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earthquake_memory.json
          git diff --cached --quiet || git commit -m "update earthquake_memory [skip ci]"
          git push

  # ──────────────────────────────────────────
  # 日次まとめジョブ（毎日深夜0時30分 JST）
  # ──────────────────────────────────────────
  earthquake-daily:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && contains(github.event.schedule, '30 15')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run daily summary
        run: python earthquake_daily.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}
