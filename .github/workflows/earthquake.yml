name: Earthquake Auto Post

on:
  schedule:
    - cron: '*/10 * * * *'   # 速報：10分おきに起動
    - cron: '0 15 * * *'     # 日次まとめ：毎日0時00分 JST（= UTC 15:00）
    - cron: '0 22 * * *'     # コンテンツ記事①：毎日7時00分 JST（= UTC 22:00）
    - cron: '0 7 * * *'      # コンテンツ記事②：毎日16時00分 JST（= UTC 7:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # 速報ジョブ（10分おき）
  # ──────────────────────────────────────────
  earthquake-alert:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '*/10 * * * *')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run earthquake alert
        run: python earthquake_alert.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}

      - name: Save memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earthquake_memory.json
          git diff --cached --quiet || git commit -m "update earthquake_memory [skip ci]"
          git pull --rebase
          git push

  # ──────────────────────────────────────────
  # 日次まとめジョブ（毎日0時 JST）
  # ──────────────────────────────────────────
  earthquake-daily:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' &&
      github.event.schedule == '0 15 * * *'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run daily summary
        run: python earthquake_daily.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}

  # ──────────────────────────────────────────
  # コンテンツ記事ジョブ（1日2回）
  # ──────────────────────────────────────────
  earthquake-content:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' &&
      (github.event.schedule == '0 22 * * *' ||
       github.event.schedule == '0 7 * * *')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run content post
        run: python earthquake_content.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}

      - name: Save memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_memory.json
          git diff --cached --quiet || git commit -m "update content_memory [skip ci]"
          git pull --rebase
          git push
