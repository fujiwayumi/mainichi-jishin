name: Earthquake Auto Post

on:
  schedule:
    - cron: '*/5 * * * *'    # 速報：5分おきに起動
    - cron: '0 2 * * *'      # コンテンツ記事①：毎日11時00分 JST（= UTC 2:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # 速報ジョブ（10分おき）
  # ──────────────────────────────────────────
  earthquake-alert:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '*/5 * * * *')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run earthquake alert
        run: python earthquake_alert.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}

      - name: Save memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earthquake_memory.json
          git diff --cached --quiet || git commit -m "update earthquake_memory [skip ci]"
          git pull --rebase
          git push

  # ──────────────────────────────────────────
  # コンテンツ記事ジョブ（1日2回）
  # ──────────────────────────────────────────
  earthquake-content:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' &&
      (github.event.schedule == '0 2 * * *' ||
       github.event.schedule == '0 11 * * *')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run content post
        run: python earthquake_content.py
        env:
          EQ_WP_URL:       ${{ secrets.EQ_WP_URL }}
          EQ_WP_USER:      ${{ secrets.EQ_WP_USER }}
          EQ_WP_PASSWORD:  ${{ secrets.EQ_WP_PASSWORD }}
          AMAZON_TAG:      ${{ secrets.AMAZON_TAG }}
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}

      - name: Save memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_memory.json
          git diff --cached --quiet || git commit -m "update content_memory [skip ci]"
          git pull --rebase
          git push
